description: >-
  Google Gemini 是 Google 最新的多模态 AI 系列，包括 Gemini 2.0 Flash、
  Gemini 1.5 Pro 等。通过 Google AI Studio 可免费使用 API，
  限额非常慷慨，是目前免费额度最高的主流 AI API 之一。
category: multi-modal
tags:
