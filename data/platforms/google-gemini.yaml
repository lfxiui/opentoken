  models_included:
    - gemini-2.0-flash
    - gemini-1.5-flash
    - gemini-1.5-pro
  limits:
    requests_per_minute: "15 (Flash)"
    requests_per_day: "1500 (Flash)"
    tokens_per_minute: "100万 (Flash)"
  signup_url: https://aistudio.google.com
  requires_credit_card: false

